<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş BIST Sinyal Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 12px; border: none; }
        .table-hover tbody tr:hover { background-color: #e2e6ea; }
        .gecmis-kutulari { letter-spacing: 2px; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-1 text-center text-dark fw-bold">BIST Sinyal ve Trend Paneli</h2>
        <p class="text-center text-muted mb-4">SuperTrend & 200 EMA Kesişim Analizi</p>
        
        <div class="card shadow-lg">
            <div class="card-body p-0">
                <table class="table table-hover table-borderless align-middle mb-0 text-center">
                    <thead class="table-dark">
                        <tr>
                            <th class="py-3">Hisse Kodu</th>
                            <th class="py-3">Son Kapanış</th>
                            <th class="py-3">Son 5 Gün (Geçmiş)</th>
                            <th class="py-3">Anlık Sinyal Durumu</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for hisse in hisseler %}
                        <tr>
                            <td class="py-3"><strong>{{ hisse.hisse }}</strong></td>
                            <td class="py-3">{{ hisse.fiyat }} ₺</td>
                            <td class="py-3 gecmis-kutulari">{{ hisse.gecmis }}</td>
                            <td class="py-3">
                                <span class="badge {{ hisse.renk_class }} py-2 px-3 fs-6 shadow-sm">
                                    {{ hisse.durum }}
                                </span>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
