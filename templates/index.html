<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="refresh" content="180">
    
    <title>BIST Sinyal Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #f4f6f9; }
        /* Mobilde geçmiş kutucuklarının (🟩🟥) daha okunaklı olması için aralarını hafif açıyoruz */
        .gecmis-kutu { letter-spacing: 2px; font-size: 1.1rem; }
        .hisse-isim { font-weight: 700; color: #2c3e50; }
        .sinyal-rozet { font-size: 0.9rem; padding: 8px 12px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container mt-4 mb-5">
        
        <div class="text-center mb-4">
            <h2 class="fw-bold" style="color: #1a252f;">BIST Sinyal ve Trend Paneli</h2>
            <p class="text-muted mb-1">SuperTrend & 200 EMA Kesişim Analizi</p>
            <span class="badge bg-secondary">🟢 Sistem Aktif: Her 3 dakikada bir güncellenir</span>
        </div>

        <div class="table-responsive shadow-sm rounded bg-white">
            <table class="table table-hover table-borderless text-center align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="py-3">Hisse Kodu</th>
                        <th class="py-3">Son Kapanış</th>
                        <th class="py-3">Son 5 Gün</th>
                        <th class="py-3">Anlık Sinyal Durumu</th>
                    </tr>
                </thead>
                <tbody>
                    {% for hisse in hisseler %}
                    <tr style="border-bottom: 1px solid #f0f0f0;">
                        <td class="hisse-isim py-3">{{ hisse.hisse }}</td>
                        <td class="py-3 fw-medium">{{ hisse.fiyat }} ₺</td>
                        <td class="gecmis-kutu py-3">{{ hisse.gecmis }}</td>
                        <td class="py-3">
                            <span class="badge {{ hisse.renk_class }} sinyal-rozet shadow-sm">
                                {{ hisse.durum }}
                            </span>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
